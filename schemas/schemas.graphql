type User {
    id: Number!
    name: String!
    age: Number!
    hobbies: [String!]!
}

type Message {
    id: Number!
    from: String!
    body: {
        subject: String!
        text: String!
    }
    category: String!
    budgetRange: {
        from: Number!
        to: Number!
    }
}

type Query {
    user(id: Number): User
    message(id: Number): Message
}
